seed: 2026
device: auto

model:
  emb_dim: 16
  cam_hidden: 32
  epsilon: 0.2
  lambda_reg: 0.1

training:
  epochs: 5
  batch_size: 128
  lr: 0.001
  weight_decay: 0.00001
  patience: 3
  val_ratio: 0.1
  test_ratio: 0.2

data:
  student_col: student_id
  exercise_col: exercise_id
  label_col: label
  exercise_key_col: exercise_id
