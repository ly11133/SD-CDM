seed: 2026
device: auto

model:
  emb_dim: 64
  cam_hidden: 256
  epsilon: 0.2
  lambda_reg: 0.1

training:
  epochs: 100
  batch_size: 256
  lr: 0.001
  weight_decay: 0.00001
  patience: 10
  val_ratio: 0.1
  test_ratio: 0.2

data:
  student_col: student_id
  exercise_col: exercise_id
  label_col: label
  exercise_key_col: exercise_id
